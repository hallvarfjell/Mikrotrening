<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Øktbygger v2.3 – Intervall PWA</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/phosphor-icons@1.4.2"></script>
</head>
<body>
<header class="topbar">
  <div class="nav">
    <a href="index.html">Til hovedskjerm</a>
    <a href="log.html">Øktlogg</a>
    <a href="settings.html">Innstillinger</a>
  </div>
</header>
<main class="layout">
  <section class="leftcol">
    <div class="card">
      <h3>Øktinformasjon</h3>
      <div class="row" style="display:grid;gap:8px">
        <label>Øktnavn
          <input id="b-name" type="text" placeholder="f.eks. Terskel – 4×10 min" />
        </label>
        <label>Beskrivelse (fritekst)
          <textarea id="b-desc" rows="3" placeholder="Hva er hensikten med økta?" ></textarea>
        </label>
      </div>
    </div>

    <div class="card">
      <h3>Øktinnhold</h3>
      <div class="toolbar">
        <button id="add-warmup" class="secondary"><i class="ph-thermometer-simple"></i> Oppvarming</button>
        <button id="add-series" class="secondary"><i class="ph-rows"></i> Serie</button>
        <button id="add-single" class="secondary"><i class="ph-timer"></i> Enkelt‑drag</button>
        <button id="add-block" class="secondary"><i class="ph-folders"></i> Blokk</button>
        <button id="add-cooldown" class="secondary"><i class="ph-snowflake"></i> Nedjogg</button>
      </div>
      <div id="steps" class="steps"></div>
      <p class="small">Tips: Dra for å endre rekkefølge. Drar du et enkelt‑drag oppå et annet enkelt‑drag, dannes en blokk.</p>
    </div>

    <div class="card">
      <div class="row" style="display:flex;gap:8px;flex-wrap:wrap">
        <button id="b-save" class="primary"><i class="ph-floppy-disk"></i> Lagre som ny</button>
        <button id="b-update" class="secondary hidden"><i class="ph-floppy-disk"></i> Oppdater mal</button>
        <button id="b-clear" class="ghost"><i class="ph-trash"></i> Nullstill</button>
      </div>
      <p class="small">Lagring konverterer øktinnhold til warmup/serier/nedjogg slik hovedsida forstår.</p>
    </div>
  </section>

  <section class="rightcol">
    <div class="card">
      <h3>Lagrede maler</h3>
      <div id="b-list"></div>
    </div>
  </section>
</main>
<script src="builder.js" defer></script>
</body>
</html>

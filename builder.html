<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Øktbygger v2.1 – Intervall PWA</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/phosphor-icons@1.4.2"></script>
</head>
<body>
<header class="topbar">
  <div class="nav">
    <a href="index.html">Til hovedskjerm</a>
    <a href="log.html">Logg</a>
    <a href="settings.html">Innstillinger</a>
  </div>
</header>
<main class="layout">
  <section class="leftcol">
    <div class="card">
      <h3>Grunnoppsett</h3>
      <div class="row">
        <label>Navn
          <input id="w-name" type="text" placeholder="f.eks. 3×(4×3/1) + 10 min nedjogg" />
        </label>
        <label>Oppvarming (min)
          <input id="w-warm" type="number" min="0" step="1" value="10" />
        </label>
      </div>
    </div>

    <div class="card">
      <h3>Serier (drag + pause)</h3>
      <div id="series-list"></div>
      <div class="row" style="gap:6px;margin-top:8px">
        <button id="add-series" class="secondary"><i class="ph-plus"></i> Legg til serie</button>
        <button id="clear-series" class="ghost"><i class="ph-trash"></i> Tøm serier</button>
      </div>
      <small class="muted">Hver serie: <b>reps</b> × (<b>work</b> s + <b>rest</b> s) + valgfri <b>seriepause</b> før neste serie.</small>
    </div>

    <div class="card">
      <h3>Nedjogg (til slutt)</h3>
      <div class="row">
        <label>Nedjogg (min)
          <input id="w-cool" type="number" min="0" step="1" value="10" />
        </label>
      </div>
    </div>

    <div class="card">
      <h3>Mål (valgfritt, visning)</h3>
      <div class="row">
        <label>Mål‑fart drag (km/t)
          <input id="w-target-speed" type="number" min="0" max="30" step="0.1" />
        </label>
        <label>Mål‑stigning (%)
          <input id="w-target-grade" type="number" min="0" max="40" step="0.5" />
        </label>
      </div>
    </div>

    <div class="card">
      <div class="row" style="gap:8px">
        <button id="w-save" class="primary"><i class="ph-floppy-disk"></i> Lagre mal</button>
        <button id="w-clear" class="secondary"><i class="ph-trash"></i> Nullstill alt</button>
      </div>
      <p class="muted">Malene dukker automatisk opp på hovedskjermen og i dropdown‑lista der.</p>
    </div>
  </section>

  <section class="rightcol">
    <div class="card">
      <h3>Forhåndsvisning</h3>
      <div id="w-preview"></div>
    </div>
    <div class="card">
      <h3>Lagrede maler</h3>
      <div id="w-list"></div>
    </div>
  </section>
</main>
<script src="builder.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Øktbygger – Intervall PWA</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/phosphor-icons@1.4.2"></script>
</head>
<body>
<header class="topbar">
  <h1>Øktbygger</h1>
  <div class="devicectl">
    <a class="secondary" href="index.html"><i class="ph-arrow-left ph-fw"></i> Til hovedskjerm</a>
  </div>
</header>
<main class="layout">
  <section class="leftcol">
    <div class="card">
      <h3>Grunnoppsett</h3>
      <div class="row">
        <label>Navn
          <input id="w-name" type="text" placeholder="f.eks. 5×5 min @ raskt" />
        </label>
        <label>Oppvarming (min)
          <input id="w-warm" type="number" min="0" step="1" value="10" />
        </label>
        <label>Nedkjøling (min)
          <input id="w-cool" type="number" min="0" step="1" value="10" />
        </label>
      </div>
    </div>

    <div class="card">
      <h3>Serier</h3>
      <div class="row">
        <label>Antall drag (reps)
          <input id="w-reps" type="number" min="1" step="1" value="5" />
        </label>
        <label>Drag (sek)
          <input id="w-work" type="number" min="10" step="10" value="300" />
        </label>
        <label>Pause (sek)
          <input id="w-rest" type="number" min="0" step="10" value="60" />
        </label>
      </div>
      <small class="muted">v1: enkel struktur (warmup, reps×(work+rest), cooldown). Avanserte pyramider og fartslek kommer i v2.</small>
    </div>

    <div class="card">
      <h3>Mål (valgfritt, visning)</h3>
      <div class="row">
        <label>Mål‑fart drag (km/t)
          <input id="w-target-speed" type="number" min="0" max="30" step="0.1" />
        </label>
        <label>Mål‑stigning (%)
          <input id="w-target-grade" type="number" min="0" max="40" step="0.5" />
        </label>
      </div>
    </div>

    <div class="card">
      <div class="row" style="gap:8px">
        <button id="w-save" class="primary"><i class="ph-floppy-disk"></i> Lagre mal</button>
        <button id="w-clear" class="secondary"><i class="ph-trash"></i> Tøm felter</button>
      </div>
      <p class="muted">Malene dukker automatisk opp som ekstra knapper på hovedskjermen.</p>
    </div>
  </section>

  <section class="rightcol">
    <div class="card">
      <h3>Forhåndsvisning</h3>
      <div id="w-preview"></div>
    </div>
    <div class="card">
      <h3>Lagrede maler</h3>
      <div id="w-list"></div>
    </div>
  </section>
</main>
<script src="builder.js" defer></script>
</body>
</html>

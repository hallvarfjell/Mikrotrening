
<!DOCTYPE html>
<html lang='no'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<link rel='stylesheet' href='style.css'>
<script defer src='main.js'></script>
</head>
<body>
<header class='topbar'><h1>Intervalltrening</h1>
<button id='connect-hr'>Koble til pulsbelte</button>
<button id='connect-treadmill'>Koble til tredemølle</button>
</header>
<main class='layout'>
<section class='leftcol'>
<div class='card metrics'>
<div class='metric'><label>Puls</label><span id='pulse' class='big'>--</span></div>
<div class='metric'><label>Estimert watt</label><span id='watt'>--</span></div>
<div class='metric'><label>Slope</label><span id='slope'>--</span></div>
</div>
<div class='card controls'>
<h3>Fart og stigning</h3>
<button class='speed-btn' data-speed='10'>10 km/t</button>
<button class='speed-btn' data-speed='15'>15 km/t</button>
<input id='manual-speed' type='number' placeholder='Fart'>
<input id='manual-grade' type='number' placeholder='Stigning'>
</div>
<div class='card workout'>
<h3>Intervalløkt</h3>
<button class='preset' data-set='6x5'>6x5</button>
<button class='preset' data-set='10x4'>10x4</button>
<button class='preset' data-set='6x6'>6x6</button>
<button class='preset' data-set='8x6'>8x6</button>
<div id='current-interval'>--</div>
<div id='phase'>--</div>
<div id='timer' class='big'>00:00</div>
<button id='skip-warmup'>Hopp over oppvarming</button>
<button id='skip-cooldown'>Hopp over nedkjøling</button>
</div>
</section>
<section class='rightcol'>
<div class='card graphcard'>
<canvas id='chart'></canvas>
</div>
</section>
</main>
</body>
</html>

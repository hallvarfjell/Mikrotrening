<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8" />
    <title>Intervallcoach PWA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />

    <!-- Chart.js via CDN (cachet av service worker) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1>Intervallcoach</h1>
            <div class="header-right">
                <div class="hrmax-config">
                    <label for="hr-max-input">HFmax:</label>
                    <input type="number" id="hr-max-input" value="190" min="100" max="230" />
                </div>
                <span id="zone-label">Sone: -</span>
            </div>
        </header>

        <main class="layout">
            <!-- Venstre: tilkobling + live-metrikk + fart/stigning -->
            <section class="left-panel">
                <div class="connection-panel card">
                    <h2>Tilkobling</h2>
                    <button id="connect-hr-btn">Koble til pulsbelte</button>
                    <button id="connect-treadmill-btn">Koble til tredemølle</button>
                    <div id="connection-status" class="status-text">Ikke tilkoblet</div>
                </div>

                <div class="metrics-panel card">
                    <h2>Live-data</h2>
                    <div class="metric-row">
                        <div class="metric-label">Puls</div>
                        <div class="metric-value">
                            <span id="hr-value">--</span>
                            <span class="metric-unit">bpm</span>
                        </div>
                    </div>
                    <div class="metric-row">
                        <div class="metric-label">Estimert watt</div>
                        <div class="metric-value">
                            <span id="watt-value">--</span>
                            <span class="metric-unit">W</span>
                        </div>
                    </div>
                    <div class="metric-row">
                        <div class="metric-label">Slope (2 min)</div>
                        <div class="metric-value">
                            <span id="slope-value">--</span>
                            <span class="metric-unit">bpm</span>
                        </div>
                    </div>
                </div>

                <div class="speed-panel card">
                    <h2>Fart og stigning</h2>
                    <div class="form-row">
                        <label for="speed-input">Fart (km/t)</label>
                        <input type="number" id="speed-input" min="0" step="0.1" value="10" />
                    </div>
                    <div class="quick-buttons">
                        <button class="speed-quick-btn" data-speed="10">10 km/t</button>
                        <button class="speed-quick-btn" data-speed="15">15 km/t</button>
                    </div>
                    <div class="form-row">
                        <label for="incline-input">Stigning (%)</label>
                        <input type="number" id="incline-input" min="0" step="0.5" value="1" />
                    </div>
                </div>
            </section>

            <!-- Høyre: økt, timer, intervall-editor -->
            <section class="right-panel">
                <div class="workout-panel card">
                    <h2>Intervalløkt</h2>

                    <div class="quick-workouts">
                        <button class="quick-workout-btn" data-preset="6x5">6 × 5 min (1 min pause)</button>
                        <button class="quick-workout-btn" data-preset="10x4">10 × 4 min (1 min pause)</button>
                        <button class="quick-workout-btn" data-preset="6x6">6 × 6 min (1 min pause)</button>
                        <button class="quick-workout-btn" data-preset="8x6">8 × 6 min (1 min pause)</button>
                    </div>

                    <div class="workout-select-row">
                        <label for="workout-select">Lagrede økter:</label>
                        <select id="workout-select"></select>
                        <button id="delete-workout-btn">Slett</button>
                    </div>

                    <details class="workout-editor">
                        <summary>Rediger/lag ny økt</summary>
                        <div class="form-grid">
                            <div>
                                <label for="workout-name-input">Navn</label>
                                <input type="text" id="workout-name-input" placeholder="Min intervalløkt" />
                            </div>
                            <div>
                                <label for="warmup-input">Oppvarming (min)</label>
                                <input type="number" id="warmup-input" min="0" step="1" value="10" />
                            </div>
                            <div>
                                <label for="dragtime-input">Dragtid (min)</label>
                                <input type="number" id="dragtime-input" min="1" step="1" value="5" />
                            </div>
                            <div>
                                <label for="reps-input">Repetisjoner</label>
                                <input type="number" id="reps-input" min="1" step="1" value="6" />
                            </div>
                            <div>
                                <label for="pause-input">Pause (min)</label>
                                <input type="number" id="pause-input" min="0" step="0.5" value="1" />
                            </div>
                            <div>
                                <label for="cooldown-input">Nedjogg (min)</label>
                                <input type="number" id="cooldown-input" min="0" step="1" value="10" />
                            </div>
                        </div>
                        <button id="save-workout-btn">Lagre økt</button>
                    </details>

                    <div class="workout-steps">
                        <h3>Struktur</h3>
                        <ul id="workout-steps-list"></ul>
                    </div>
                </div>

                <div class="timer-panel card">
                    <h2>Status</h2>
                    <div id="current-phase-label" class="phase-label">Ingen økt valgt</div>
                    <div id="rep-info" class="rep-info"></div>
                    <div id="countdown-timer" class="countdown-timer">00:00</div>
                    <div class="timer-buttons">
                        <button id="start-pause-btn">Start</button>
                        <button id="next-segment-btn">Neste</button>
                        <button id="reset-btn">Nullstill</button>
                    </div>
                </div>
            </section>
        </main>

        <section class="graph-section card">
            <div class="graph-header">
                <h2>Graf</h2>
                <div class="graph-controls">
                    <label>
                        <input type="checkbox" id="show-hr" checked />
                        Puls
                    </label>
                    <label>
                        <input type="checkbox" id="show-watt" checked />
                        Watt
                    </label>
                    <label>
                        <input type="checkbox" id="show-speed" checked />
                        Fart
                    </label>
                </div>
            </div>
            <canvas id="data-chart"></canvas>
        </section>
    </div>

    <script src="app.js"></script>

    <script>
        // Registrer service worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .catch(err => console.error('SW registrering feilet:', err));
            });
        }
    </script>
</body>
</html>
``

<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Backyard Timer</title>

<!-- ✅ Manifest -->
manifest.json
<meta name="theme-color" content="#222" />

<!-- ✅ Icons -->
<link rel="icon" sizes="192le-touch-icon" sizes="192x1922" href="icon-512.png"pt src="https://cdn.jsdelivr.net/npm/@supabase/supabase XLSX (SheetJS) -->
<script src=".cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js

<!-- ✅ CSS -->
<style>
body { margin:0; font-family:Arial, sans-serif; background:#f2f2f2; }

nav { display:flex; background:#222; }
nav button { flex:1; padding:12px; border:none; background:#222; color:white; font-size:16px; }
nav button.active { background:#444; }

.page { display:none; padding:10px; }
.page.active { display:block; }

.header { font-size:clamp(22px,5vw,40px); text-align:center; font-weight:bold; }
.subheader { font-size:clamp(16px,3vw,24px); text-align:center; margin-bottom:12px; }

.grid { display:grid; gap:8px; margin-top:10px; }
@media(min-width:1000px){.grid{grid-template-columns:repeat(4,1fr);} }
@media(max-width:999px){.grid{grid-template-columns:repeat(3,1fr);} }
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr);} }

.runner { padding:16px; border-radius:6px; border:1px solid #999; font-size:clamp(16px,3vw,28px); }
.white{background:white;}
.green{background:#4caf50;color:white;}
.red{background:#f44336;color:white;}
.gray{background:#777;color:white;}

.panel { background:white; padding:12px; border-radius:8px; margin-bottom:12px; }

table { width:100%; border-collapse:collapse; background:white; }
th,td { border:1px solid #ccc; padding:4px; text-align:center; }
th { background:#eee; }

.modal {
  position:fixed; top:0; left:0; right:0; bottom:0;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.6);
  visibility:hidden; opacity:0; transition:0.2s;
}
.modal.active { visibility:visible; opacity:1; }

.modal-box {
  background:white; padding:20px; border-radius:10px;
  width:90%; max-width:400px;
}

.modal-buttons { text-align:right; margin-top:15px; }
.modal-buttons button { margin-left:8px; }
</style>

<!-- ✅ Service Worker REG -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", async () => {
    const regs = await navigator.serviceWorker.getRegistrations();
    regs.forEach(r => r.unregister()); // fjerner gamle ødelagte SWs

    navigator.serviceWorker.register("service-worker.js")
      .then(() => console.log("✅ Service worker registered"))
      .catch(err => console.error("SW error:", err));
  });
}
</script>

</head>

<body>

<nav>
 <button onclick="showPage('register')" id="navRegister">Registrering</button>
 <button onclick="showPage('live')" id="navLive">Live</button>
 <button onclick="showPage('admin')" id="navAdmin">Admin</button>
 <button onclick="showPage('log')" id="navLog">Logg</button>
</nav>

<!-- ✅ REGISTRERING -->
<div id="register" class="page active">
 <div class="header" id="roundHeader"></div>
 <div class="subheader" id="countdownHeader"></div>
 <div class="grid" id="runnerGrid"></div>
</div>

<!-- ✅ LIVE -->
<div id="live" class="page">
 <div class="panel">
  <div class="header" id="liveRound"></div>
  <div class="subheader" id="liveCountdown"></div>
 </div>
 <table id="liveTable"></table>
</div>

<!-- ✅ ADMIN -->
<div id="admin" class="page">
 <div class="panel">
  <h3>Løpsinnstillinger</h3>

  Format:
  <select id="raceType">
    <option value="backyard">Backyard</option>
    <option value="frontyard">Frontyard</option>
    <option value="custom">Custom</option>
  </select><br>

  Starttid:
  <input type="datetime-local" id="startTime"><br>

  Intervall (min):
  <input type="number" id="interval" value="60"><br>

  Rundelengde (km):
  <input type="number" id="distance" value="6.7" step="0.01">

  <div id="adminCountdown" style="margin-top:8px;font-weight:bold;"></div>

  <br>
  <button onclick="startRace()">Start</button>
  <button onclick="stopRace()">Stopp</button>
  <button onclick="resetRace()">Reset</button>
 </div>

 <div class="panel">
  <h3>Deltakere</h3>
  <button onclick="openAddModal()">Legg til deltaker</button>
  <input type="file" id="csvInput" onchange="importParticipants(event)">
  <table id="adminTable"></table>
 </div>
</div>

<!-- ✅ LOG -->
<div id="log" class="page">
 <h3>Løpslogg</h3>
 <table id="logTable"></table>
</div>

<!-- ✅ MODAL -->
<div class="modal" id="modalAdd">
 <div class="modal-box">
  <h3>Legg til deltaker</h3>

  BIB:<br>
  <input id="modalBib" style="width:100%;"><br>

  Navn:<br>
  <input id="modalName" style="width:100%;">

  <div class="modal-buttons">
    <button onclick="closeAddModal()">Avbryt</button>
    <button onclick="confirmAddParticipant()">Lagre</button>
  </div>
 </div>
</div>

<!-- ✅ LAST APP.JS TIL SLUTT -->
<script src="app.js"></script>

</body>
</html>

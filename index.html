<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body { font-family: sans-serif; margin:0; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px; }
button { font-size:20px; padding:20px; }
.done { background:#4caf50; color:white; }
.out { background:#ccc; }
.top { padding:10px; background:#eee; }
</style>
</head>
<body>

<div class="top">
<span id="time"></span>
<button onclick="add()">+</button>
</div>

<div class="grid" id="grid"></div>

<h3>Resultat</h3>
<div id="result"></div>

<h3>Siste</h3>
<div id="last"></div>

<script>
const url="YOUR_URL"
const key="YOUR_KEY"
const db=supabase.createClient(url,key)

let participants=[]
let laps=[]
let start

async function load(){
  participants=(await db.from('participants').select('*')).data
  laps=(await db.from('laps').select('*')).data
  start=new Date((await db.from('race').select('*').eq('id',1).single()).data.start_time)
  draw()
}

function draw(){
  const now=new Date()
  const hour=Math.floor((now-start)/3600000)+1

  document.getElementById('time').innerText=
    "Runde "+hour+" "+format((now-start)%3600000)

  const grid=document.getElementById('grid')
  grid.innerHTML=""

  participants.forEach(p=>{
    const b=document.createElement('button')
    b.innerText=p.bib+" "+p.name
    if(!p.active) b.classList.add('out')
    if(doneThisHour(p.id,hour)) b.classList.add('done')
    b.onclick=()=>stamp(p.id)
    grid.appendChild(b)
  })

  drawResult()
  drawLast()
}

function doneThisHour(id,hour){
  return laps.find(l=>l.participant_id==id && l.lap_number==hour)
}

async function stamp(id){
  const now=new Date()
  const hour=Math.floor((now-start)/3600000)+1
  if(doneThisHour(id,hour)) return

  const sec=Math.floor((now-start)%3600000/1000)

  await db.from('laps').insert({
    participant_id:id,
    lap_number:hour,
    lap_seconds:sec
  })
}

function drawResult(){
  const map={}
  participants.forEach(p=>map[p.id]={name:p.name,laps:0,time:0})

  laps.forEach(l=>{
    map[l.participant_id].laps++
    map[l.participant_id].time+=l.lap_seconds
  })

  const arr=Object.values(map)
  arr.sort((a,b)=>b.laps-a.laps || a.time-b.time)

  document.getElementById('result').innerHTML=
    arr.map(r=>`${r.name} ${r.laps} ${format(r.time*1000)}`).join("<br>")
}

function drawLast(){
  const last=laps.slice(-5).reverse()
  document.getElementById('last').innerHTML=
    last.map(l=>{
      const p=participants.find(p=>p.id==l.participant_id)
      return `${p.name} ${format(l.lap_seconds*1000)}
      <button onclick="del(${l.id})">x</button>`
    }).join("<br>")
}

async function del(id){
  await db.from('laps').delete().eq('id',id)
}

async function add(){
  const name=prompt("Navn")
  const bib=prompt("Nr")
  await db.from('participants').insert({name,bib})
}

function format(ms){
  const s=Math.floor(ms/1000)
  return Math.floor(s/60)+":"+String(s%60).padStart(2,"0")
}

db.channel('realtime')
  .on('postgres_changes',{event:'*',schema:'public'},load)
  .subscribe()

setInterval(draw,1000)
load()
</script>

</body>
</html>

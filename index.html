<!doctype html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backyard / Frontyard Ultra</title>

  <!-- (CSS er uendret bortsett fra layoutjustering for starttid-raden) -->
  <style>
    /* === eksisterende CSS beholdt === */
    /* Kun relevant tillegg: */
    .row-full {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>
<div class="app">

  <!-- NAV -->
  <nav class="nav">
    <button class="active" data-screen="registrering">1. Registrering</button>
    <button data-screen="live">2. Live</button>
    <button data-screen="admin">3. Admin</button>
    <button data-screen="logg">4. Logg</button>
  </nav>

  <!-- REGISTRERING -->
  <section class="screen active" id="screen-registrering">
    <div class="panel">
      <div id="registrationContent"></div>
    </div>
  </section>

  <!-- LIVE -->
  <section class="screen" id="screen-live">
    <div class="panel">
      <div id="liveClocks"></div>
      <table id="liveTable">
        <thead>
          <tr>
            <th>#</th><th>Navn</th><th>Runder</th><th>Distanse</th>
            <th>Total tid</th><th>Siste runde</th><th>Fart</th><th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <!-- ADMIN -->
  <section class="screen" id="screen-admin">
    <div class="grid-2">

      <!-- LØPSOPPSETT -->
      <div class="panel">
        <h2>Løpsoppsett</h2>

        <div class="row">
          <div class="field">
            <label>Løpsmal</label>
            <select id="templateSelect"></select>
          </div>
          <div class="field">
            <label>Løpsnavn</label>
            <input id="raceName" placeholder="Visningsnavn for løpet" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Rundelengde (km)</label>
            <input id="distanceKm" type="number" step="0.001" />
          </div>
          <div class="field">
            <label>Tilgjengelig tid (min)</label>
            <input id="roundMinutes" type="number" />
          </div>
        </div>

        <!-- ✅ EGEN RAD FOR STARTTID -->
        <div class="row-full">
          <div class="field">
            <label>Starttid (lokal tid)</label>
            <input id="startTime" type="datetime-local" />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>
              <input type="checkbox" id="reductionEnabled" />
              Frontyard‑modus
            </label>
          </div>
          <div class="field">
            <label>Reduksjon per runde (min)</label>
            <input id="reductionPerRound" type="number" />
          </div>
        </div>

        <div class="actions">
          <button id="saveTemplateBtn">Lagre løpsmal</button>
          <button id="startRaceBtn">Start løp</button>
          <button id="stopRaceBtn">Stopp løp</button>
        </div>
      </div>

      <!-- RUNDETIDER -->
      <div class="panel">
        <h2>Rundetider</h2>
        <table id="roundTable"></table>
      </div>

    </div>
  </section>

  <!-- LOGG -->
  <section class="screen" id="screen-logg">
    <div class="panel">
      <h2>Logg</h2>
      <div id="logContent"></div>
    </div>
  </section>

</div>

<!-- MODAL -->
<div class="modal" id="confirmModal">
  <div class="modal-card">
    <h3 id="confirmTitle"></h3>
    <p id="confirmText"></p>
    <div class="actions">
      <button id="confirmNo">Nei</button>
      <button id="confirmYes">Ja</button>
    </div>
  </div>
</div>

<script type="module">
/* ===========================
   SUPABASE + STATE
   =========================== */
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://wjmucbavcslivuzofayi.supabase.co',
  'ANON_KEY_HER',
  { auth: { persistSession: false } }
);

const state = {
  activeRace: null,
  participants: [],
  laps: [],
  logs: [],
  autoStopDismissed: false,
  wakeLock: null
};

/* ===========================
   WAKE LOCK
   =========================== */
async function enableWakeLock() {
  try {
    state.wakeLock = await navigator.wakeLock.request('screen');
  } catch {}
}
function releaseWakeLock() {
  if (state.wakeLock) state.wakeLock.release();
  state.wakeLock = null;
}

/* ===========================
   STOPP LØP (MED BEKREFTELSE)
   =========================== */
async function stopRaceConfirmed() {
  const { data } = await supabase
    .from('races')
    .update({ status: 'stopped', end_time: new Date().toISOString() })
    .eq('id', state.activeRace.id)
    .select()
    .single();

  state.activeRace = data;
  releaseWakeLock();
  renderAll();
}

function confirmStopRace(reason) {
  document.getElementById('confirmTitle').textContent = 'Stopp løp';
  document.getElementById('confirmText').textContent =
    reason || 'Er du sikker på at du vil stoppe løpet?';

  document.getElementById('confirmModal').classList.add('open');
  document.getElementById('confirmYes').onclick = stopRaceConfirmed;
  document.getElementById('confirmNo').onclick = () => {
    document.getElementById('confirmModal').classList.remove('open');
    if (reason) state.autoStopDismissed = true;
  };
}

/* ===========================
   AUTO STOPP NÅR ALLE ER DNF
   =========================== */
function checkAutoStop() {
  if (!state.activeRace || state.autoStopDismissed) return;
  const active = state.participants.filter(p => p.status !== 'finished');
  if (active.length === 0) {
    confirmStopRace('Alle deltakere er DNF. Ønsker du å stoppe løpet?');
  }
}

/* ===========================
   RENDER
   =========================== */
function renderAll() {
  // render registrering, live, admin, logg
}

/* ===========================
   INIT
   =========================== */
document.getElementById('stopRaceBtn').onclick = () =>
  confirmStopRace();

document.addEventListener('visibilitychange', () => {
  if (document.hidden) releaseWakeLock();
});

</script>
</body>
</html>

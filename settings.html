<!DOCTYPE html><html lang='no'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Innstillinger – Intervall PWA</title><link rel='stylesheet' href='style.css' /></head><body><header class='topbar'><div class='nav'><a href='index.html'>Til hovedskjerm</a><a href='builder.html'>Øktbygger</a><a href='log.html'>Logg</a></div></header><main class='layout'><section class='leftcol'><div class='card'><h3>Bruker</h3><div class='row'><label>Kroppsvekt (kg)<input id='s-mass' type='number' min='30' max='200' step='0.5' /></label><label>LT1 (bpm)<input id='s-lt1' type='number' min='80' max='220' step='1' /></label><label>LT2 (bpm)<input id='s-lt2' type='number' min='80' max='220' step='1' /></label></div></div><div class='card'><h3>Powermodell</h3><div class='row'><label>Kalibrering K<input id='s-cal-k' type='number' step='0.01' /></label><label>C_run (J/kg/m)<input id='s-c-run' type='number' step='0.05' /></label></div><p class='small'>Ytre arbeid: P = m·g·v·grade + C_run·m·v → deretter ×K.</p></div><div class='card'><h3>Graf</h3><div class='row'><label><input type='checkbox' id='s-default-hr' /> Vis HR som standard</label><label><input type='checkbox' id='s-default-watt' /> Vis Watt som standard</label><label><input type='checkbox' id='s-default-speed' /> Vis Fart som standard</label><label><input type='checkbox' id='s-default-rpe' /> Vis RPE som standard</label></div></div><div class='card'><button id='s-save' class='primary'>Lagre innstillinger</button></div></section></main><script>(function(){const g=(k,d)=>{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);};const s=id=>document.getElementById(id);const set=(k,v)=>localStorage.setItem(k, JSON.stringify(v));s('s-mass').value=g('massKg',75);s('s-lt1').value=g('LT1',135);s('s-lt2').value=g('LT2',160);s('s-cal-k').value=g('calK',1.0);s('s-c-run').value=g('cRun',1.0);s('s-default-hr').checked=g('defHR',true);s('s-default-watt').checked=g('defWatt',true);s('s-default-speed').checked=g('defSpeed',false);s('s-default-rpe').checked=g('defRPE',true);s('s-save').onclick=()=>{set('massKg', Number(s('s-mass').value||75));set('LT1', Number(s('s-lt1').value||135));set('LT2', Number(s('s-lt2').value||160));set('calK', Number(s('s-cal-k').value||1.0));set('cRun', Number(s('s-c-run').value||1.0));set('defHR', !!s('s-default-hr').checked);set('defWatt', !!s('s-default-watt').checked);set('defSpeed', !!s('s-default-speed').checked);set('defRPE', !!s('s-default-rpe').checked);alert('Lagret');};})();</script></body></html>
